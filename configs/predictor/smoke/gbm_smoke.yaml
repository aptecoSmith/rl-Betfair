session: smoke
seed: 0
dataset:
  feature_variant: V1
  train_corpus: tvl_mask_29d
  horizons: [3m, 7m]
architecture:
  family: gbm
  variant_label: t300
  kwargs:
    n_trees: 200
    max_depth: 5
    learning_rate: 0.05
output:
  formulation: pinball3
  quantiles: [0.1, 0.5, 0.9]
training:
  batch_size: 1024
  learning_rate: 0.05  # ignored for GBM (kwargs.learning_rate used)
  max_epochs: 1
  early_stopping_patience: 1
device: cpu
