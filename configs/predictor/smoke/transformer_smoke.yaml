session: smoke
seed: 0
dataset:
  feature_variant: V1
  train_corpus: tvl_mask_29d
  horizons: [3m, 7m]
architecture:
  family: transformer
  variant_label: L4
  kwargs:
    depth: 4
    d_model: 64
    heads: 4
    ctx_ticks: 32
    dropout: 0.1
output:
  formulation: pinball3
  quantiles: [0.1, 0.5, 0.9]
training:
  batch_size: 1024
  learning_rate: 0.001
  max_epochs: 3
  early_stopping_patience: 2
device: cuda
