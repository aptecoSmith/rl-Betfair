database:
  host: localhost
  port: 3306
  cold_data_db: coldData
  hot_data_db: hotDataRefactored
population:
  size: 50
  n_elite: 5
  selection_top_pct: 0.5
  mutation_rate: 0.3
  # Optional cap on simultaneous gene mutations per child. null = legacy
  # per-gene coin-flip behaviour (~9 mutations on average from 30 genes).
  # Setting to 1-3 makes attribution of gain/regression to specific genes
  # much cleaner. See plans/issues-12-04-2026/11-mutation-count-cap/.
  max_mutations_per_child: null
  # Which models compete in the breeding pool each generation.
  # run_only:        only this run's agents (default, current behaviour)
  # include_garaged: this run's agents + garaged models (parent-only)
  # full_registry:   all active+garaged models (parent-only)
  # See plans/issues-12-04-2026/08-breeding-pool-scope/.
  breeding_pool: run_only
  # Adaptive breeding (Issue 09). Detect bad generations and respond.
  # bad_generation_threshold: best composite score below this triggers
  #                           the policy. 0.0 disables detection.
  # bad_generation_policy:    persist (do nothing) | boost_mutation
  #                           (increase mutation rate) | inject_top
  #                           (load top garaged models as parent-only).
  # adaptive_mutation:        when true, mutation rate increases each
  #                           consecutive bad generation, resets on good.
  bad_generation_threshold: 0.0
  bad_generation_policy: persist
  adaptive_mutation: false
  adaptive_mutation_increment: 0.1
  adaptive_mutation_cap: 0.8
reward:
  early_pick_bonus_min: 1.2
  early_pick_bonus_max: 1.5
  early_pick_min_seconds: 300
  terminal_bonus_weight: 1.0
  commission: 0.05
  efficiency_penalty: 0.01
  precision_bonus: 1.0
  drawdown_shaping_weight: 0.0
  spread_cost_weight: 0.0
  inactivity_penalty: 0.0
  # Forced-arbitrage (scalping) reward terms (Issue 05, session 2).
  # Only active when training.scalping_mode is true. Default 0.0 means
  # the scalping reward branch is a no-op even if scalping_mode is on —
  # bump these to shape the behaviour.
  #   naked_penalty_weight: multiplier on naked-exposure penalty
  #     (penalty = -weight * naked_exposure / starting_budget)
  #   early_lock_bonus_weight: multiplier on completed-pair bonus
  #     proportional to ticks remaining when the second leg filled
  naked_penalty_weight: 0.0
  early_lock_bonus_weight: 0.0
  # Per-step mark-to-market shaping weight
  # (plans/reward-densification, Session 02, 2026-04-19).
  # 0.0 = no-op (rollouts byte-identical to pre-Session-01 code);
  # 0.05 is the first-cut default calibrated so the cumulative
  # shaped MTM across a race is order-of-magnitude-comparable with
  # the race's raw P&L without dominating it. See purpose.md
  # "Picking the default weight" for the calibration argument and
  # hard_constraints.md §11 for why this is NOT a GA gene in this
  # plan.
  mark_to_market_weight: 0.05
  # Arb-curriculum Session 02 (2026-04-19). Per-pair shaped bonus on
  # pair maturation (completed or agent-closed). Zero-mean corrected
  # against matured_arb_expected_random (default 2 pairs/race).
  # Bounded by matured_arb_bonus_cap. Default 0.0 is a no-op.
  # See plans/arb-curriculum/purpose.md.
  matured_arb_bonus_weight: 0.0
  matured_arb_bonus_cap: 10.0
  matured_arb_expected_random: 2.0
  # Arb-curriculum Session 03 (2026-04-19). Per-pair loss-side scalar on
  # naked cash flows (winners untouched). 1.0 = byte-identical. Per-agent
  # gene in [0.05, 1.0]; plan-level naked_loss_anneal schedule may
  # interpolate toward 1.0 across generations.
  naked_loss_scale: 1.0
  # Scalping-active-management auxiliary-head loss weights (plumbing
  # off by default — activation playbook bumps these per its Step E
  # before Session 07 validation). Declared here so per-plan
  # ``reward_overrides`` can be validated against the config.
  fill_prob_loss_weight: 0.0
  risk_loss_weight: 0.0
  coefficients:
    win_rate: 0.35
    sharpe: 0.3
    mean_daily_pnl: 0.15
    efficiency: 0.2
paths:
  processed_data: data/processed
  backup_data: data/backup
  model_weights: registry/weights
  bet_logs: logs/bet_logs
  logs: logs
  registry_db: registry/models.db
  streamrecorder_backups: ../StreamRecorder1/backups
  mysql_bin: /c/Program Files/MySQL/MySQL Server 9.6/bin/mysql.exe
training:
  architecture: ppo_lstm_v1
  starting_budget: 100.0
  max_runners: 14
  max_bets_per_race: 20
  require_gpu: true
  reevaluate_garaged_default: false
  betting_constraints:
    max_back_price: 50.0
    max_lay_price: null
    min_seconds_before_off: 0
    # Force-close at T−N (plans/arb-signal-cleanup, Session 01,
    # 2026-04-21). Triggers env-initiated best-available close on any
    # open pair with an unfilled second leg once time_to_off drops to
    # or below this threshold (scalping_mode only). Default 0 =
    # disabled = byte-identical to pre-change. Typical active value:
    # 30. Plan files enable this on the probe cohorts via
    # constraints overrides; config-level stays disabled so
    # non-probe runs don't accidentally inherit it.
    force_close_before_off_seconds: 0
  retraining:
    min_days: 30
  # Forced-arbitrage (scalping) mode — Issue 05. When true, every
  # aggressive fill auto-generates a passive counter-order on the
  # opposite side N ticks away. The policy action head gains a 5th
  # dimension per runner (arb_spread) and the observation gains arb
  # state features. Off by default — legacy behaviour is byte-identical.
  scalping_mode: true
  # Arb-curriculum Session 05 (2026-04-19). Per-agent training-day ordering
  # derived from oracle density. Every day is still seen exactly once per
  # epoch; only the order changes. Default random = pre-change behaviour.
  # density_desc: arb-rich days first (pairs with BC warm-start).
  # density_asc:  arb-sparse days first (ablation only).
  # Missing oracle cache for a date is treated as density=0.
  curriculum_day_order: density_desc
  # Shaped-penalty warmup (plans/arb-signal-cleanup, Session 02,
  # 2026-04-21). Linearly scales efficiency_cost and precision_reward
  # from 0 to 1 across the first N PPO rollout episodes. BC pretrain
  # episodes don't count. Default 0 = disabled = byte-identical to
  # pre-change. Typical active value: 10. Plan files enable this on
  # the probe cohorts; config-level stays disabled so non-probe runs
  # don't accidentally inherit it. See
  # plans/arb-signal-cleanup/purpose.md.
  shaped_penalty_warmup_eps: 0
discard_policy:
  min_win_rate: 0.35
  min_mean_pnl: 0.0
  min_mean_return_pct: 0.0
  min_sharpe: -0.5
hyperparameters:
  search_ranges:
    learning_rate:
      type: float_log
      min: 1.0e-05
      max: 0.0005
    ppo_clip_epsilon:
      type: float
      min: 0.1
      max: 0.3
    entropy_coefficient:
      type: float
      min: 0.001
      max: 0.05
    # Arb-signal-cleanup Session 01 (2026-04-21): target-entropy
    # controller SGD learning rate. Previously hardcoded at 1e-2 in
    # PPOTrainer; promoted to a per-agent gene because the 2026-04-21
    # arb-curriculum-probe Validation observed monotone entropy drift
    # that the hardcoded value could not arrest once entropy passed
    # ~157. Default (no gene override) stays 1e-2 so reference runs
    # without alpha_lr in their gene schema are byte-identical. Plan-
    # level hp_ranges on the probe widen this to [1e-2, 1e-1].
    # hard_constraints.md §15–§18.
    alpha_lr:
      type: float_log
      min: 0.01
      max: 0.1
    gamma:
      type: float
      min: 0.95
      max: 0.999
    gae_lambda:
      type: float
      min: 0.9
      max: 0.98
    value_loss_coeff:
      type: float
      min: 0.25
      max: 1.0
    lstm_hidden_size:
      type: int_choice
      choices:
      - 64
      - 128
      - 256
      - 512
      - 1024
      - 2048
    mlp_hidden_size:
      type: int_choice
      choices:
      - 64
      - 128
      - 256
    mlp_layers:
      type: int
      min: 1
      max: 3
    lstm_num_layers:
      type: int_choice
      choices:
      - 1
      - 2
    lstm_dropout:
      type: float
      min: 0.0
      max: 0.3
    lstm_layer_norm:
      type: int_choice
      choices:
      - 0
      - 1
    transformer_heads:
      type: int_choice
      choices:
      - 2
      - 4
      - 8
    transformer_depth:
      type: int_choice
      choices:
      - 1
      - 2
      - 3
    transformer_ctx_ticks:
      type: int_choice
      choices:
      - 32
      - 64
      - 128
      # 256 added 2026-04-21 per plans/arb-signal-cleanup §14a-§14d.
      # Default gene-level membership is additive — strictly no
      # choices removed. Plan files can pin this via hp_ranges override
      # without this list changing (they do so for transformer cohorts
      # that need full-race attention coverage).
      - 256
    early_pick_bonus_min:
      type: float
      min: 1.0
      max: 1.3
    early_pick_bonus_max:
      type: float
      min: 1.1
      max: 1.8
    early_pick_min_seconds:
      type: int
      min: 120
      max: 900
    terminal_bonus_weight:
      type: float
      min: 0.5
      max: 3.0
    reward_efficiency_penalty:
      type: float
      min: 0.001
      max: 0.05
    reward_precision_bonus:
      type: float
      min: 0.0
      max: 3.0
    reward_drawdown_shaping:
      type: float
      min: 0.0
      max: 0.2
    reward_spread_cost_weight:
      type: float
      min: 0.0
      max: 1.0
    inactivity_penalty:
      type: float
      min: 0.0
      max: 2.0
    # Forced-arbitrage (scalping) genes — Issue 05, session 3.
    # Only meaningful when training.scalping_mode is on (the env's
    # 5th per-runner action dim and the naked/early-lock reward terms
    # are no-ops when scalping_mode is off). Adding them to
    # search_ranges keeps the schema inspector honest so the gene
    # editor can render widgets for them even on non-scalping runs.
    arb_spread_scale:
      type: float
      min: 0.5
      max: 2.0
    naked_penalty_weight:
      type: float
      min: 0.0
      max: 5.0
    early_lock_bonus_weight:
      type: float
      min: 0.0
      max: 2.0
    market_type_filter:
      type: str_choice
      choices:
        - WIN
        - EACH_WAY
        - BOTH
        - FREE_CHOICE
    architecture_name:
      type: str_choice
      choices:
      - ppo_lstm_v1
      - ppo_time_lstm_v1
      - ppo_transformer_v1
    # Arb-curriculum Session 04 (2026-04-19). BC pretrain genes.
    # bc_pretrain_steps=0 disables BC entirely (default — no-op).
    # bc_learning_rate governs the separate BC Adam optimiser only.
    # bc_target_entropy_warmup_eps controls how many PPO episodes the
    # target-entropy controller anneals from post-BC measured entropy
    # up to the configured target (150). 0 disables warmup.
    bc_pretrain_steps:
      type: int
      min: 0
      max: 2000
    bc_learning_rate:
      type: float_log
      min: 1.0e-05
      max: 1.0e-03
    bc_target_entropy_warmup_eps:
      type: int
      min: 0
      max: 20
actions:
  force_aggressive: false
features:
  obi_top_n: 3
  microprice_top_n: 3
  traded_delta_window_s: 60
  mid_drift_window_s: 60
  book_churn_top_n: 3
training_worker:
  host: localhost
  port: 8002
