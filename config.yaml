database:
  host: localhost
  port: 3306
  cold_data_db: coldData
  hot_data_db: hotDataRefactored
population:
  size: 50
  n_elite: 5
  selection_top_pct: 0.5
  mutation_rate: 0.3
reward:
  early_pick_bonus_min: 1.2
  early_pick_bonus_max: 1.5
  early_pick_min_seconds: 300
  terminal_bonus_weight: 1.0
  commission: 0.05
  efficiency_penalty: 0.01
  precision_bonus: 1.0
  drawdown_shaping_weight: 0.0
  spread_cost_weight: 0.0
  coefficients:
    win_rate: 0.35
    sharpe: 0.3
    mean_daily_pnl: 0.15
    efficiency: 0.2
paths:
  processed_data: data/processed
  backup_data: data/backup
  model_weights: registry/weights
  logs: logs
  registry_db: registry/models.db
  streamrecorder_backups: ../StreamRecorder1/backups
  mysql_bin: /c/Program Files/MySQL/MySQL Server 9.6/bin/mysql.exe
training:
  architecture: ppo_lstm_v1
  starting_budget: 100.0
  max_runners: 14
  max_bets_per_race: 20
  require_gpu: true
  reevaluate_garaged_default: true
  betting_constraints:
    max_back_price: 100.0
    max_lay_price: null
    min_seconds_before_off: 0
  retraining:
    min_days: 30
discard_policy:
  min_win_rate: 0.35
  min_mean_pnl: 0.0
  min_sharpe: -0.5
hyperparameters:
  search_ranges:
    learning_rate:
      type: float_log
      min: 1.0e-05
      max: 0.0005
    ppo_clip_epsilon:
      type: float
      min: 0.1
      max: 0.3
    entropy_coefficient:
      type: float
      min: 0.001
      max: 0.05
    gamma:
      type: float
      min: 0.95
      max: 0.999
    gae_lambda:
      type: float
      min: 0.9
      max: 0.98
    value_loss_coeff:
      type: float
      min: 0.25
      max: 1.0
    lstm_hidden_size:
      type: int_choice
      choices:
      - 64
      - 128
      - 256
      - 512
      - 1024
      - 2048
    mlp_hidden_size:
      type: int_choice
      choices:
      - 64
      - 128
      - 256
    mlp_layers:
      type: int
      min: 1
      max: 3
    lstm_num_layers:
      type: int_choice
      choices:
      - 1
      - 2
    lstm_dropout:
      type: float
      min: 0.0
      max: 0.3
    lstm_layer_norm:
      type: int_choice
      choices:
      - 0
      - 1
    transformer_heads:
      type: int_choice
      choices:
      - 2
      - 4
      - 8
    transformer_depth:
      type: int_choice
      choices:
      - 1
      - 2
      - 3
    transformer_ctx_ticks:
      type: int_choice
      choices:
      - 32
      - 64
      - 128
    early_pick_bonus_min:
      type: float
      min: 1.0
      max: 1.3
    early_pick_bonus_max:
      type: float
      min: 1.1
      max: 1.8
    early_pick_min_seconds:
      type: int
      min: 120
      max: 900
    terminal_bonus_weight:
      type: float
      min: 0.5
      max: 3.0
    reward_efficiency_penalty:
      type: float
      min: 0.001
      max: 0.05
    reward_precision_bonus:
      type: float
      min: 0.0
      max: 3.0
    reward_drawdown_shaping:
      type: float
      min: 0.0
      max: 0.2
    reward_spread_cost_weight:
      type: float
      min: 0.0
      max: 1.0
    architecture_name:
      type: str_choice
      choices:
      - ppo_lstm_v1
      - ppo_time_lstm_v1
      - ppo_transformer_v1
features:
  obi_top_n: 3
  microprice_top_n: 3
  traded_delta_window_s: 60
  mid_drift_window_s: 60
training_worker:
  host: localhost
  port: 8002
